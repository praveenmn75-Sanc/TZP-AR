<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Park Wildlife AR Zone</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    
    <!-- Stable Framework Configuration via unpkg -->
    <script src="https://aframe.io"></script>
    <script src="https://unpkg.com"></script>

    <style>
      .ar-ui-container {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        gap: 15px;
      }
      .btn {
        background: #1e4620;
        color: white;
        border: 2px solid #ffffff;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 30px;
        cursor: pointer;
        box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
      }
      body {
        margin: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>

    <!-- UI Button Layer -->
    <div class="ar-ui-container">
      <button class="btn" onclick="spawnAnimal('tiger')">Bengal Tiger</button>
    </div>

    <!-- FIXED: Explicitly forcing standard tracking systems inside scene mapping tags -->
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="tiger-model" src="https://jsdelivr.net"></a-asset-item>
      </a-assets>

      <!-- Placed straight ahead relative to base coordinate map spaces -->
      
        <!-- Asset injection target -->
      

      <!-- Forced Video Perspective Anchor Frame -->
      

      
      

    </a-scene>

    <script>
      window.spawnAnimal = function(type) {
        const entity = document.getElementById('active-wildlife');
        if (entity && type === 'tiger') {
          entity.setAttribute('gltf-model', '#tiger-model');
          console.log("Bengal Tiger model applied successfully!");
        }
      };
      
      // Auto-trigger the model loading cleanly once elements resolve
      window.addEventListener('load', () => {
        setTimeout(() => window.spawnAnimal('tiger'), 500);
      });
    </script>
  </body>
</html>
