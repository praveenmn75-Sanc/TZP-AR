<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Park Wildlife AR Zone</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    
    <!-- Core Stable A-Frame framework -->
    <script src="https://aframe.io"></script>
    
    <!-- Open-Source Native Camera AR Engine Library -->
    <script src="https://githack.com"></script>

    <style>
      /* Quick UI Styling for the interaction layout */
      .ar-ui-container {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        gap: 15px;
      }
      .btn {
        background: #1e4620;
        color: white;
        border: 2px solid #ffffff;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 30px;
        cursor: pointer;
        box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
      }
      /* Clean browser body settings for streaming canvas frames */
      body {
        margin: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>

    <!-- UI Interaction Overlay Container -->
    <div class="ar-ui-container">
      <button class="btn" onclick="spawnAnimal('tiger')">Bengal Tiger</button>
    </div>

    <!-- Initialize Open Camera Tracking Component Setup -->
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
      
      <!-- Preloaded 3D GLTF/GLB Asset Containers -->
      <a-assets>
        <a-asset-item id="tiger-model" src="https://jsdelivr.net"></a-asset-item>
      </a-assets>

      <!-- Active Viewport Perspective Rig tracking the environment video feed -->
      <a-marker-camera preset="hiro">
        
        
      </a-marker-camera>

      <!-- Ambient and Directional Dynamic Scene Illumination -->
      
      

    </a-scene>

    <script>
      // Safe execution logic for model swap requests
      window.spawnAnimal = function(type) {
        const entity = document.getElementById('active-wildlife');
        if (entity && type === 'tiger') {
          entity.setAttribute('gltf-model', '#tiger-model');
          console.log("Bengal Tiger model applied successfully!");
        }
      };
    </script>
  </body>
</html>
