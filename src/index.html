<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Park Wildlife AR Zone</title>
    
    <!-- Core A-Frame framework -->
    <script src="https://aframe.io"></script>
    
    <!-- 8th Wall Open-Source WebAR Engine Library -->
    <script src="https://8thwall.org"></script>

    <!-- 8th Wall Extras Component System -->
    <script src="https://8thwall.org"></script>

    <style>
      /* Quick UI Styling for the capture layout */
      .ar-ui-container {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        display: flex;
        gap: 15px;
      }
      .btn {
        background: #1e4620;
        color: white;
        border: 2px solid #ffffff;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 30px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>

    <!-- UI Interaction Overlay Container -->
    <div class="ar-ui-container">
      <button class="btn" onclick="spawnAnimal('tiger')">Bengal Tiger</button>
    </div>

    <!-- FIXED: Added empty key validation string inside xrweb parameter -->
    <a-scene 
      xrweb="allowedDevices: any; appKey: empty;" 
      xrextras-gesture-detector 
      xrextras-loading
      component-listener>
      
      <!-- Preloaded 3D GLTF/GLB Asset Containers -->
      <a-assets>
        <a-asset-item id="tiger-model" src="https://jsdelivr.net"></a-asset-item>
      </a-assets>

      <!-- Active Viewport Perspective Rig -->
      <a-camera id="camera" position="0 1.6 0"></a-camera>

      <!-- Surface SLAM Tracking Group -->
      
        
        
      

      <!-- Ambient and Directional Dynamic Scene Illumination -->
      
      

    </a-scene>

    <script>
      // Force direct execution logic for structural asset model swap requests
      window.spawnAnimal = function(type) {
        const entity = document.getElementById('active-wildlife');
        if (entity && type === 'tiger') {
          entity.setAttribute('gltf-model', '#tiger-model');
          console.log("Bengal Tiger model applied successfully!");
        }
      };

      // Force 8th wall video canvas request manually on screen load
      window.addEventListener('load', () => {
        const sceneEl = document.querySelector('a-scene');
        if (sceneEl) {
          console.log("A-Scene found. Forcing 8th Wall component initialization.");
          
          // Request camera initialization parameters manually from engine tree
          if (window.XR8) {
            window.XR8.run({canvas: document.getElementById('camera')});
          }
          
          setTimeout(() => window.spawnAnimal('tiger'), 1000);
        }
      });
    </script>
  </body>
</html>
