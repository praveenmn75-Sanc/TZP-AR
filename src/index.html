<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Park Wildlife AR Zone</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    
    <!-- STABLE PAIRING: A-Frame 1.2.0 + Fixed Release AR.js to ensure immediate camera invocation -->
    <script src="https://aframe.io"></script>
    <script src="https://githack.com"></script>

    <style>
      .ar-ui-container {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        gap: 15px;
      }
      .btn {
        background: #1e4620;
        color: white;
        border: 2px solid #ffffff;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 30px;
        cursor: pointer;
        box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
      }
      body {
        margin: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>

    <!-- UI Interaction Overlay Container -->
    <div class="ar-ui-container">
      <button class="btn" onclick="spawnAnimal('tiger')">Bengal Tiger</button>
    </div>

    <!-- Initialize Camera View Tracking System -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Preloaded 3D GLTF/GLB Asset Containers -->
      <a-assets>
        <a-asset-item id="tiger-model" src="https://jsdelivr.net"></a-asset-item>
      </a-assets>

      <!-- Anchored 3D Scene Node positioned directly in front of user's field of view -->
      
        
      

      <!-- Explicit camera rigging forced into tracking scene framework -->
      

      <!-- Lighting Layers -->
      
      

    </a-scene>

    <script>
      // Safe execution logic for model swap requests
      window.spawnAnimal = function(type) {
        const entity = document.getElementById('active-wildlife');
        if (entity && type === 'tiger') {
          entity.setAttribute('gltf-model', '#tiger-model');
          console.log("Bengal Tiger model applied successfully!");
        }
      };
      
      // Auto-trigger the asset setup on window completion
      window.addEventListener('load', () => {
        setTimeout(() => window.spawnAnimal('tiger'), 800);
      });
    </script>
  </body>
</html>
